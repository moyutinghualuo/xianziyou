<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- 冰色外框 -->
  <rect x="8" y="8" width="104" height="104" rx="6" fill="none" stroke="#8898a8" stroke-width="3" filter="url(#rough)"/>
  <rect x="15" y="15" width="90" height="90" rx="4" fill="none" stroke="#a0b0c0" stroke-width="0.8" opacity="0.5"/>
  <!-- 仙字 — 冷银墨色 -->
  <text x="60" y="78" text-anchor="middle" font-family="serif" font-size="55" font-weight="bold" fill="#8898a8" filter="url(#rough)">仙</text>
  <!-- 底部小字 -->
  <text x="60" y="98" text-anchor="middle" font-family="serif" font-size="10" fill="#a0b0c0" opacity="0.6">Wiki</text>
</svg>
