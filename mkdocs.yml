site_name: 仙侠 Wiki
site_description: 仙侠世界观 Wiki 知识库
site_url: https://moyutinghualuo.github.io/xianziyou/
repo_url: https://github.com/moyutinghualuo/xianziyou
repo_name: xianziyou
edit_uri: edit/main/docs/

# Favicon & 站点图标
theme:
  name: material
  language: zh
  logo: logo.svg
  custom_dir: docs/overrides
  font: false
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
  palette:
    # 亮色 — 宣纸
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-sunny
        name: 切换至暗色模式
    # 暗色 — 墨砚
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-night
        name: 切换至亮色模式

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  # Giscus 评论系统配置
  giscus:
    repo_id: "1272264260"
    category: "Discussions"
    category_id: "DIC_kwzOEAAVyM4CeYvP"
    mapping: "pathname"
    reactions_enabled: true
    emit_metadata: false
    input_position: "top"
    theme: "auto"
    lang: "zh-CN"

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: zh
  - awesome-pages

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: "¶"
      toc_depth: 3
  - attr_list
  - md_in_html
